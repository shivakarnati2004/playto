version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: playto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgresql@12$$
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate && 
             python seed.py && 
             gunicorn --bind 0.0.0.0:8000 config.wsgi:application"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:Postgresql%4012%24@db:5432/playto
      - DEBUG=True
      - SECRET_KEY=django-insecure-docker-secret-key-123
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost:80,http://localhost:3000,http://localhost:3002
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-shivakarnati69@gmail.com}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
