

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: playto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate && 
             python seed.py && 
             gunicorn --bind 0.0.0.0:8000 --timeout 120 --workers 2 config.wsgi:application"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    ports:
      - "8000:8000"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=playto
      - DEBUG=True
      - SECRET_KEY=django-insecure-docker-secret-key-change-in-prod
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost:80,http://localhost:3000,http://localhost:3002
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER:-shivakarnati69@gmail.com}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-shivakarnati69@gmail.com}
      - OTP_EXPIRY_MINUTES=10
      - OTP_LENGTH=6
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_media:
